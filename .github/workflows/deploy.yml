name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - 001-outbound-callcenter-poc
      - 002-voicelive-integration
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ContactCenter-API/ContactCenter-API.csproj

      - name: Build
        run: dotnet build ContactCenter-API/ContactCenter-API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ContactCenter-API/ContactCenter-API.csproj --configuration Release --no-build --output ./api-publish

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: ./api-publish

  build-app:
    name: Build APP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ContactCenter-APP/ContactCenter-APP.csproj

      - name: Build
        run: dotnet build ContactCenter-APP/ContactCenter-APP.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ContactCenter-APP/ContactCenter-APP.csproj --configuration Release --no-build --output ./app-publish

      - name: Upload APP artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ./app-publish

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build-api]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test CallCenterPOC-API.Tests/CallCenterPOC-API.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~Unit" --verbosity normal

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [build-api, test]
    environment:
      name: production
      url: https://contactcenterpoc-api.azurewebsites.net
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-package
          path: ./api-publish

      - name: Deploy to Azure App Service (API)
        uses: azure/webapps-deploy@v3
        with:
          app-name: contactcenterpoc-api
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./api-publish

  deploy-app:
    name: Deploy APP
    runs-on: ubuntu-latest
    needs: [build-app, test]
    environment:
      name: production
      url: https://contactcenterpoc-app.azurewebsites.net
    steps:
      - name: Download APP artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package
          path: ./app-publish

      - name: Deploy to Azure App Service (APP)
        uses: azure/webapps-deploy@v3
        with:
          app-name: contactcenterpoc-app
          publish-profile: ${{ secrets.AZURE_APP_PUBLISH_PROFILE }}
          package: ./app-publish
